name: Sort
on:
  workflow_run:
    workflows: ["TG"]  # Name of the primary workflow
    types:
      - completed  # Trigger only when the primary workflow is completed
    branches: [main] 
  push:
    paths:
      - 'sort/sort.py'

  workflow_dispatch:
jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: Zero output
      run: |
        > sort/sort.txt
        
    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run sorter script
      run: python sort/sort.py
      
    - name: Check for Output Changes
      id: changes
      run: |
        git diff --quiet && echo 'No changes' || echo '::set-output name=changed::true'   
      
    - name: Commit and push sorter changes
      if: steps.changes.outputs.changed == 'true'   
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add sort/sort.txt sort/US.txt sort/IR.txt
        timestamp=$(TZ='Asia/Tehran' date)
        git commit -m "✅Updated ${timestamp}" -a
        git push
